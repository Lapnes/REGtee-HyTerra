version: '3.8'

services:
  db:
    image: postgres:16.5
    container_name: Hyterrapostgre
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password_here
      POSTGRES_DB: your_database_name
    ports:
      - "8067:5432"
    volumes:
      - "./data:/var/lib/postgresql/data"
